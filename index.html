<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ビジュアルタイマー</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="タイマー" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#ffffff" id="themeColorMeta" />

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:           #ffffff;
      --surface:      #f5f5f5;
      --fg:           #1a1a1a;
      --fg-sub:       #666666;
      --fg-dim:       #aaaaaa;
      --border:       #e0e0e0;
      --pill-bg:      #f0f0f0;
      --pill-border:  #e0e0e0;
      --icon-bg:      #f0f0f0;
      --icon-fg:      #555555;
      --preset-bg:    #f0f0f0;
      --preset-fg:    #333333;
      --preset-border:#e0e0e0;
      --modal-bg:     #ffffff;
      --input-bg:     #f5f5f5;
      --input-border: #d0d0d0;
      --cancel-bg:    #f0f0f0;
      --cancel-fg:    #555555;
      /* canvas colors */
      --c-empty:      #e8e8e8;
      --c-ring:       #cccccc;
      --c-label:      #333333;
      --c-tick-major: #999999;
      --c-tick-minor: #cccccc;
      --c-center:     #333333;
      --c-edge:       #b30000;
    }

    [data-theme="dark"] {
      --bg:           #111827;
      --surface:      #1f2937;
      --fg:           #f3f4f6;
      --fg-sub:       #9ca3af;
      --fg-dim:       #4b5563;
      --border:       #374151;
      --pill-bg:      #1f2937;
      --pill-border:  #374151;
      --icon-bg:      #1f2937;
      --icon-fg:      #9ca3af;
      --preset-bg:    #1f2937;
      --preset-fg:    #d1d5db;
      --preset-border:#374151;
      --modal-bg:     #1f2937;
      --input-bg:     #111827;
      --input-border: #374151;
      --cancel-bg:    #374151;
      --cancel-fg:    #9ca3af;
      --c-empty:      #2d3748;
      --c-ring:       #374151;
      --c-label:      #9ca3af;
      --c-tick-major: #6b7280;
      --c-tick-minor: #374151;
      --c-center:     #9ca3af;
      --c-edge:       #ff6b6b;
    }

    body {
      background: var(--bg);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh; min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
      color: var(--fg);
      overflow: hidden;
      user-select: none;
      transition: background .25s, color .25s;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 20px;
      margin-bottom: clamp(12px, 2.5vh, 28px);
      position: relative;
    }

    .header-title {
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--fg-sub);
      text-transform: uppercase;
      transition: color .25s;
    }

    #themeBtn {
      position: absolute;
      right: 20px;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--icon-bg);
      color: var(--icon-fg);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .1s;
    }
    #themeBtn:active { transform: scale(.9); }

    /* ── Timer canvas wrap ── */
    .timer-wrap {
      position: relative;
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      cursor: crosshair;
      touch-action: none;
    }

    #c { width: 100%; height: 100%; display: block; }

    /* 中央の直接入力ボタン（中心ドットの上に重ねる） */
    .center-btn-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #centerEditBtn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      transition: background .15s;
    }
    #centerEditBtn:not([disabled]):active {
      background: rgba(128,128,128,0.15);
    }
    #centerEditBtn[disabled] { pointer-events: none; }

    /* ── Time pill ── */
    .time-pill-wrap {
      margin-top: clamp(14px, 2.5vh, 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #timePill {
      background: var(--pill-bg);
      border: 1.5px solid var(--pill-border);
      border-radius: 50px;
      padding: 8px 28px;
      font-size: clamp(26px, 7vw, 38px);
      font-weight: 300;
      letter-spacing: 4px;
      color: var(--fg);
      cursor: pointer;
      transition: background .2s, border-color .2s, color .25s, transform .1s;
    }
    #timePill:not([disabled]):active {
      transform: scale(.97);
      background: var(--border);
    }
    #timePill[disabled] { cursor: default; pointer-events: none; }

    .time-sub {
      font-size: 11px;
      color: var(--fg-dim);
      letter-spacing: 2px;
      transition: color .25s;
    }

    /* ── Preset row ── */
    .presets {
      display: flex;
      gap: 8px;
      margin-top: clamp(12px, 2vh, 20px);
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 16px;
    }

    .preset-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--preset-border);
      background: var(--preset-bg);
      color: var(--preset-fg);
      font-size: clamp(12px, 2.2vw, 13px);
      font-weight: 500;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .preset-btn:active { transform: scale(.93); }

    /* ── Main play button ── */
    .play-wrap {
      margin-top: clamp(14px, 2.5vh, 22px);
    }

    #playBtn {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: none;
      background: #cc0000;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(204,0,0,.35);
      transition: transform .1s, box-shadow .1s;
    }
    #playBtn:active {
      transform: scale(.93);
      box-shadow: 0 2px 8px rgba(204,0,0,.25);
    }

    /* ── Bottom icon bar ── */
    .icon-bar {
      display: flex;
      gap: 20px;
      margin-top: clamp(14px, 2.5vh, 22px);
      align-items: center;
    }

    .icon-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--icon-bg);
      color: var(--icon-fg);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s, border-color .25s;
    }
    .icon-btn:active { transform: scale(.9); }

    /* ── 直接入力モーダル ── */
    #inputModal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center;
      z-index: 50;
      backdrop-filter: blur(4px);
    }
    #inputModal.show { display: flex; }

    .modal-box {
      background: var(--modal-bg);
      border-radius: 20px;
      padding: 28px 32px;
      width: min(300px, 86vw);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      transition: background .25s;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--fg-sub);
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .num-input {
      width: 84px;
      padding: 10px 8px;
      font-size: 30px;
      font-weight: 200;
      text-align: center;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--fg);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s;
    }
    .num-input:focus { border-color: #cc0000; }

    .input-sep {
      font-size: 28px;
      font-weight: 200;
      color: var(--fg-sub);
    }

    .input-labels {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .input-label {
      width: 84px;
      font-size: 11px;
      color: var(--fg-dim);
      letter-spacing: 1px;
      text-align: center;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-cancel {
      flex: 1; padding: 11px;
      border-radius: 10px; border: none;
      background: var(--cancel-bg);
      color: var(--cancel-fg);
      font-size: 15px; cursor: pointer;
      transition: transform .1s;
    }
    .modal-cancel:active { transform: scale(.95); }

    .modal-ok {
      flex: 1; padding: 11px;
      border-radius: 10px; border: none;
      background: #cc0000; color: #fff;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: transform .1s;
    }
    .modal-ok:active { transform: scale(.95); }

    /* ── Alarm ── */
    #alarmOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(204,0,0,.15);
      align-items: center; justify-content: center;
      animation: flashBg .9s ease-in-out infinite;
      z-index: 100;
    }
    #alarmOverlay.show { display: flex; }

    @keyframes flashBg {
      0%,100% { background: rgba(204,0,0,.08); }
      50%      { background: rgba(204,0,0,.28); }
    }

    .alarm-box {
      text-align: center;
      padding: 40px 48px;
      background: var(--modal-bg);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      margin: 0 24px;
    }

    .alarm-icon { font-size: 64px; animation: bounce .8s ease-in-out infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .alarm-msg {
      margin-top: 12px;
      font-size: 24px; font-weight: 300;
      letter-spacing: 3px;
      color: var(--fg);
    }

    #stopBtn {
      margin-top: 24px;
      padding: 13px 40px;
      border-radius: 28px; border: none;
      background: #cc0000; color: #fff;
      font-size: 17px; font-weight: 600;
      cursor: pointer; letter-spacing: .5px;
    }
    #stopBtn:active { transform: scale(.94); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title" id="headerTitle">タイマー</div>
  <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<!-- Timer -->
<div class="timer-wrap" id="timerWrap">
  <canvas id="c"></canvas>
  <div class="center-btn-wrap">
    <button id="centerEditBtn" onclick="openInput()" title="時間を直接入力"></button>
  </div>
</div>

<!-- Time pill（タップで直接入力） -->
<div class="time-pill-wrap">
  <button id="timePill" onclick="openInput()">00 : 00</button>
  <div class="time-sub" id="timeSub">タップして入力 または 円をドラッグ</div>
</div>

<!-- Presets -->
<div class="presets">
  <button class="preset-btn" onclick="setPreset(1)">1分</button>
  <button class="preset-btn" onclick="setPreset(5)">5分</button>
  <button class="preset-btn" onclick="setPreset(10)">10分</button>
  <button class="preset-btn" onclick="setPreset(25)">25分</button>
  <button class="preset-btn" onclick="setPreset(45)">45分</button>
</div>

<!-- Play button -->
<div class="play-wrap">
  <button id="playBtn" onclick="togglePlay()">▶</button>
</div>

<!-- Icon bar -->
<div class="icon-bar">
  <button class="icon-btn" onclick="resetTimer()" title="リセット">↺</button>
  <button class="icon-btn" id="soundBtn" onclick="toggleSound()" title="音切替">🔔</button>
</div>

<!-- 直接入力モーダル -->
<div id="inputModal">
  <div class="modal-box">
    <div class="modal-title">時間を入力</div>
    <div class="input-row">
      <input class="num-input" id="minInput" type="number" min="0" max="60" placeholder="00" inputmode="numeric" />
      <span class="input-sep">:</span>
      <input class="num-input" id="secInput" type="number" min="0" max="59" placeholder="00" inputmode="numeric" />
    </div>
    <div class="input-labels">
      <div class="input-label">分</div>
      <div class="input-label" style="visibility:hidden">:</div>
      <div class="input-label">秒</div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeInput()">キャンセル</button>
      <button class="modal-ok"     onclick="confirmInput()">決定</button>
    </div>
  </div>
</div>

<!-- Alarm -->
<div id="alarmOverlay">
  <div class="alarm-box">
    <div class="alarm-icon">⏰</div>
    <div class="alarm-msg">時間です！</div>
    <button id="stopBtn" onclick="stopAlarm()">止める</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('./sw.js').catch(() => {})
  );
}

(() => {
  /* ── State ── */
  let totalSec = 0, remSec = 0;
  let running = false, timer = null;
  let dragging = false;
  let audioCtx = null, alarmTimer = null;
  let soundOn = true;
  let isLight = true;

  function applyTheme(light, save = true) {
    isLight = light;
    document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = light ? '🌙' : '☀️';
    document.getElementById('themeColorMeta').content = light ? '#ffffff' : '#111827';
    if (save) localStorage.setItem('timer-theme', light ? 'light' : 'dark');
    draw();
  }
  window.toggleTheme = () => applyTheme(!isLight);

  /* ── Sound toggle ── */
  window.toggleSound = () => {
    soundOn = !soundOn;
    document.getElementById('soundBtn').textContent = soundOn ? '🔔' : '🔕';
  };

  /* ── Canvas ── */
  const wrap   = document.getElementById('timerWrap');
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let DPR = window.devicePixelRatio || 1;
  let SIZE = 320;

  function initCanvas() {
    const rect = wrap.getBoundingClientRect();
    SIZE = rect.width;
    canvas.width  = SIZE * DPR;
    canvas.height = SIZE * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  /* ── Draw（TimeTimerスタイル）── */
  function draw() {
    const s = SIZE, cx = s/2, cy = s/2;
    /* 数字ラベルを外側に置くため、円は少し内側に */
    const R      = s * 0.38;   /* 円の半径 */
    const R_tick = R + s*0.01; /* 目盛り外端 */
    const R_num  = R + s*0.08; /* 数字位置 */

    ctx.clearRect(0, 0, s, s);

    /* テーマカラー（isLight で直接定義） */
    const cEmpty   = isLight ? '#e8e8e8' : '#2d3748';
    const cRing    = isLight ? '#cccccc' : '#374151';
    const cLabel   = isLight ? '#333333' : '#9ca3af';
    const cTickMaj = isLight ? '#999999' : '#6b7280';
    const cTickMin = isLight ? '#cccccc' : '#374151';

    /* ── 空き部分（全円・薄グレー）── */
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.fillStyle = cEmpty;
    ctx.fill();

    /* ── 赤い扇形（残り時間）── */
    const frac   = totalSec > 0 ? remSec / totalSec : 0;
    const startA = -Math.PI / 2;
    const endA   = startA + frac * Math.PI * 2;

    if (frac > 0.002) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R, startA, endA);
      ctx.closePath();
      ctx.fillStyle = '#cc0000';
      ctx.fill();
    }

    /* ── 外周リング ── */
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.strokeStyle = cRing;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    /* ── 目盛り（外周）── */
    for (let i = 0; i < 60; i++) {
      const a     = (i/60)*Math.PI*2 - Math.PI/2;
      const major = i % 5 === 0;
      const len   = major ? s*0.04 : s*0.02;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a)*R,         cy + Math.sin(a)*R);
      ctx.lineTo(cx + Math.cos(a)*(R+len),   cy + Math.sin(a)*(R+len));
      ctx.strokeStyle = major ? cTickMaj : cTickMin;
      ctx.lineWidth   = major ? 1.8 : 1;
      ctx.stroke();
    }

    /* ── 数字ラベル（0, 5, 10 ... 55）── */
    ctx.save();
    ctx.font        = `500 ${s*0.042}px -apple-system, sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    ctx.fillStyle   = cLabel;
    for (let m = 0; m < 60; m += 5) {
      const a  = (m/60)*Math.PI*2 - Math.PI/2;
      const lx = cx + Math.cos(a)*R_num;
      const ly = cy + Math.sin(a)*R_num;
      ctx.fillText(String(m), lx, ly);
    }
    ctx.restore();

    /* ── 12時の境界線 ── */
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy - R);
    ctx.strokeStyle = isLight ? 'rgba(255,255,255,0.9)' : 'rgba(17,24,39,0.9)';
    ctx.lineWidth = 2;
    ctx.stroke();

    /* ── 中心ドット ── */
    ctx.beginPath();
    ctx.arc(cx, cy, s*0.028, 0, Math.PI*2);
    ctx.fillStyle = isLight ? '#333333' : '#9ca3af';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, s*0.012, 0, Math.PI*2);
    ctx.fillStyle = isLight ? '#ffffff' : '#111827';
    ctx.fill();
  }

  /* ── Time pill 更新 ── */
  function updateDisplay() {
    const m = Math.floor(remSec/60), s = remSec%60;
    document.getElementById('timePill').textContent =
      `${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;

    const sub = document.getElementById('timeSub');
    if (!running && remSec===0 && totalSec===0) sub.textContent = 'タップして入力 または 円をドラッグ';
    else if (running)                           sub.textContent = '実行中';
    else sub.textContent = remSec===totalSec    ? '準備完了' : '一時停止中';

    /* タイトルに残り時間を表示 */
    if (running || (remSec>0 && remSec<totalSec)) {
      document.getElementById('headerTitle').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} タイマー`;
    } else {
      document.getElementById('headerTitle').textContent = 'タイマー';
    }

    const disabled = running;
    document.getElementById('timePill').disabled      = disabled;
    document.getElementById('centerEditBtn').disabled = disabled;
  }

  /* ── Drag ── */
  function angleFromXY(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const px = clientX - rect.left - rect.width/2;
    const py = clientY - rect.top  - rect.height/2;
    let a = Math.atan2(py, px) + Math.PI/2;
    if (a < 0) a += Math.PI*2;
    return a;
  }
  function setFromAngle(a) {
    const mins = Math.round((a/(Math.PI*2))*60);
    totalSec = Math.min(Math.max(mins,0),60)*60;
    remSec   = totalSec;
    updateDisplay(); draw();
  }

  function onDown(e) {
    if (running) return;
    /* 中心ドット付近（半径7%以内）はボタンに任せる */
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - rect.left - rect.width/2;
    const dy = t.clientY - rect.top  - rect.height/2;
    if (Math.sqrt(dx*dx+dy*dy) < rect.width*0.07) return;
    dragging = true;
    setFromAngle(angleFromXY(t.clientX, t.clientY));
  }
  function onMove(e) {
    if (!dragging || running) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    setFromAngle(angleFromXY(t.clientX, t.clientY));
  }
  function onUp() { dragging = false; }

  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove',  onMove, {passive:false});
  canvas.addEventListener('touchend',   onUp);

  /* ── 直接入力 ── */
  window.openInput = () => {
    if (running) return;
    const m = Math.floor(remSec/60), s = remSec%60;
    document.getElementById('minInput').value = m || '';
    document.getElementById('secInput').value = s || '';
    document.getElementById('inputModal').classList.add('show');
    setTimeout(() => document.getElementById('minInput').focus(), 80);
  };
  window.closeInput = () => document.getElementById('inputModal').classList.remove('show');
  window.confirmInput = () => {
    const m = Math.min(parseInt(document.getElementById('minInput').value)||0, 60);
    const s = Math.min(parseInt(document.getElementById('secInput').value)||0, 59);
    const total = m*60 + s;
    if (total > 0) { totalSec = total; remSec = total; updateDisplay(); draw(); }
    closeInput();
  };
  document.getElementById('minInput').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('secInput').focus(); });
  document.getElementById('secInput').addEventListener('keydown', e => { if (e.key==='Enter') window.confirmInput(); });
  document.getElementById('inputModal').addEventListener('click', e => {
    if (e.target===document.getElementById('inputModal')) closeInput();
  });

  /* ── Preset ── */
  window.setPreset = min => {
    if (running) return;
    totalSec = min*60; remSec = totalSec;
    updateDisplay(); draw();
  };

  /* ── Play/Pause ── */
  window.togglePlay = () => {
    if (totalSec === 0) return;
    if (running) {
      clearInterval(timer); running = false;
      document.getElementById('playBtn').textContent = '▶';
    } else {
      if (remSec === 0) remSec = totalSec;
      running = true;
      document.getElementById('playBtn').textContent = '⏸';
      timer = setInterval(() => {
        remSec--;
        if (remSec <= 0) {
          remSec = 0; clearInterval(timer); running = false;
          document.getElementById('playBtn').textContent = '▶';
          triggerAlarm();
        }
        updateDisplay(); draw();
      }, 1000);
    }
    updateDisplay();
  };

  /* ── Reset ── */
  window.resetTimer = () => {
    clearInterval(timer); running = false;
    totalSec = 0; remSec = 0;
    document.getElementById('playBtn').textContent = '▶';
    updateDisplay(); draw();
  };

  /* ── Audio ── */
  function getAC() {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    return audioCtx;
  }
  function beep(freq, dur, vol=0.55, delay=0) {
    const ac=getAC(), osc=ac.createOscillator(), gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type='sine'; osc.frequency.value=freq;
    const t=ac.currentTime+delay;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(vol,t+0.01);
    gain.gain.linearRampToValueAtTime(0,t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  }
  function playAlarm() {
    if (!soundOn) return;
    beep(880,0.18,0.6,0); beep(1100,0.18,0.6,0.22);
    beep(880,0.18,0.6,0.44); beep(1320,0.35,0.6,0.68);
  }
  function triggerAlarm() {
    document.getElementById('alarmOverlay').classList.add('show');
    playAlarm();
    alarmTimer = setInterval(playAlarm, 1600);
  }
  window.stopAlarm = () => {
    clearInterval(alarmTimer);
    document.getElementById('alarmOverlay').classList.remove('show');
    resetTimer();
  };

  window.addEventListener('resize', () => { initCanvas(); draw(); });

  /* 初期化順序：canvas確定 → テーマ適用（内部でdraw）→ 表示更新 */
  initCanvas();
  const savedTheme = localStorage.getItem('timer-theme');
  if (savedTheme === 'dark') applyTheme(false, false);
  else applyTheme(true, false);
  updateDisplay();
})();
</script>
</body>
</html>
